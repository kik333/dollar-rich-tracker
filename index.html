<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>달러리치 매매 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <header class="bg-indigo-600 text-white p-6 shadow-md">
        <div class="container mx-auto">
            <h1 class="text-2xl font-bold italic"><i class="fa-solid fa-dollar-sign mr-2"></i>DOLLAR SEVEN SPLIT</h1>
            <p class="text-sm opacity-80 mt-1">하락 시 분할 매수, 상승 시 분할 매매 관리</p>
        </div>
    </header>

    <main class="container mx-auto p-4 md:p-8 max-w-5xl">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold mb-4 text-indigo-600 border-b pb-2">투자 설정</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase">1차 매수 기준가 (원)</label>
                            <input type="number" id="baseRate" value="1350" class="w-full mt-1 p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase">목표 수익률 (%)</label>
                            <input type="number" id="targetProfit" value="1.0" step="0.1" class="w-full mt-1 p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                            <p class="text-[10px] text-slate-400 mt-1">* 매수 후 설정한 수익률 도달 시 매도 알림</p>
                        </div>
                        <button onclick="renderTable()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition shadow-lg shadow-indigo-100">전략 테이블 갱신</button>
                    </div>
                </div>

                <div class="bg-indigo-50 p-5 rounded-2xl border border-indigo-100">
                    <h3 class="font-bold text-indigo-800 mb-2"><i class="fa-solid fa-lightbulb mr-2"></i>투자 원칙</h3>
                    <ul class="text-xs text-indigo-700 space-y-2 leading-relaxed">
                        <li>• <b>매수:</b> 이전 차수보다 환율이 1% 하락하면 다음 차수를 매수합니다.</li>
                        <li>• <b>매도:</b> 각 차수별로 독립적으로 판단하며, 매수가 대비 목표 수익률 도달 시 매도합니다.</li>
                        <li>• <b>주의:</b> 손절은 하지 않으며 환율이 회복될 때까지 기다립니다.</li>
                    </ul>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 text-slate-400 text-[11px] uppercase tracking-wider">
                                <th class="px-6 py-4">차수</th>
                                <th class="px-6 py-4">매수 목표가</th>
                                <th class="px-6 py-4">매도 목표가</th>
                                <th class="px-6 py-4">진행 상태</th>
                            </tr>
                        </thead>
                        <tbody id="strategyBody" class="divide-y divide-slate-100">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script>
        function renderTable() {
            const baseRate = parseFloat(document.getElementById('baseRate').value);
            const targetProfit = parseFloat(document.getElementById('targetProfit').value) / 100;
            const body = document.getElementById('strategyBody');
            
            body.innerHTML = '';

            for (let i = 1; i <= 7; i++) {
                // 매수 목표가: 이전 차수 대비 1% 하락
                const buyTarget = baseRate * (1 - (i - 1) * 0.01);
                // 매도 목표가: 해당 차수 매수가 대비 설정한 수익률 상승
                const sellTarget = buyTarget * (1 + targetProfit);

                const row = `
                    <tr class="hover:bg-indigo-50/30 transition">
                        <td class="px-6 py-5">
                            <span class="flex items-center justify-center w-8 h-8 rounded-full bg-slate-100 text-slate-600 font-bold text-xs">${i}</span>
                        </td>
                        <td class="px-6 py-5">
                            <div class="text-xs text-slate-400">Buy at</div>
                            <div class="text-base font-bold text-blue-600">${buyTarget.toFixed(2)} 원</div>
                        </td>
                        <td class="px-6 py-5">
                            <div class="text-xs text-slate-400">Sell at</div>
                            <div class="text-base font-bold text-rose-500">${sellTarget.toFixed(2)} 원</div>
                        </td>
                        <td class="px-6 py-5">
                            <select class="text-xs font-bold border rounded-lg px-2 py-1 outline-none focus:ring-2 focus:ring-indigo-500">
                                <option>대기 중</option>
                                <option class="text-blue-600">매수 완료</option>
                                <option class="text-rose-600">매도 완료</option>
                            </select>
                        </td>
                    </tr>
                `;
                body.insertAdjacentHTML('beforeend', row);
            }
        }

        // 초기 렌더링
        renderTable();
    </script>
</body>
</html>

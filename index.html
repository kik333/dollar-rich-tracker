<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>달러리치 - 세븐스플릿 계산기</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h1 class="text-2xl font-bold text-blue-600 mb-4">💵 달러리치 매매 계산기</h1>
        
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700">1차 기준 환율 (원)</label>
            <input type="number" id="baseRate" placeholder="예: 1350" 
                   class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            <button onclick="calculate()" class="mt-3 w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">계산하기</button>
        </div>

        <div id="result" class="hidden">
            <h2 class="text-lg font-semibold mb-3">차수별 매수 목표가</h2>
            <table class="w-full text-sm text-left border-collapse">
                <thead>
                    <tr class="bg-gray-50">
                        <th class="border-b p-2">차수</th>
                        <th class="border-b p-2">매수환율</th>
                        <th class="border-b p-2">변동률</th>
                    </tr>
                </thead>
                <tbody id="resultBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        function calculate() {
            const baseRate = parseFloat(document.getElementById('baseRate').value);
            if (!baseRate) return alert('환율을 입력해주세요.');

            const resultBody = document.getElementById('resultBody');
            resultBody.innerHTML = '';
            
            // 세븐스플릿 기본 로직: 각 차수별로 약 1%씩 하락 시 매수
            for (let i = 1; i <= 7; i++) {
                const dropRate = (i - 1) * 0.01;
                const targetRate = (baseRate * (1 - dropRate)).toFixed(2);
                
                const row = `
                    <tr class="${i === 1 ? 'bg-blue-50' : ''}">
                        <td class="border-b p-2 font-medium">${i}차</td>
                        <td class="border-b p-2 text-blue-600 font-bold">${targetRate}원</td>
                        <td class="border-b p-2 text-gray-500">-${(dropRate * 100).toFixed(0)}%</td>
                    </tr>
                `;
                resultBody.insertAdjacentHTML('beforeend', row);
            }
            document.getElementById('result').classList.remove('hidden');
        }
    </script>
</body>
</html>
